<article class="card">
  <div class="card__media">
    <img
      class="card__image"
      [src]="character().image"
      [alt]="character().name"
      loading="lazy"
    />
    <div class="card__overlay"></div>
    <span class="card__badge" [class]="statusClass()">
      <span class="card__badge-dot"></span>
      {{ character().status }}
    </span>
  </div>

  <div class="card__body">
    <h3 class="card__name">{{ character().name }}</h3>
    <p class="card__species">{{ character().species }}</p>

    <div class="card__divider"></div>

    <div class="card__info">
      <span class="card__info-label">Ubicación</span>
      <span class="card__info-value">{{ character().location.name }}</span>
    </div>

    <div class="card__info">
      <span class="card__info-label">Origen</span>
      <span class="card__info-value">{{ character().origin.name }}</span>
    </div>
  </div>
</article>
